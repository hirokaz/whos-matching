<?xml version="1.0" encoding="UTF-8"?>
<!--
  チャット雰囲気カット — スマホ画面の光（暖色）
  仕様: image-prompts.md - 「メッセージ中の雰囲気カット」
  スマホ画面が光るシーン。直接UIは見せず示唆のみ。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" role="img" aria-label="スマホ画面の光">
  <defs>
    <radialGradient id="bgChat" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#2a1c14"/>
      <stop offset="1" stop-color="#0e0a08"/>
    </radialGradient>
    <linearGradient id="phoneScreen" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f0c890" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#e8a064" stop-opacity="0.65"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bgChat)"/>
  <!-- スマホ本体 -->
  <g transform="translate(110, 50) rotate(-8 50 70)">
    <rect x="0" y="0" width="100" height="140" rx="12" fill="#0a0706" stroke="#2a1c14" stroke-width="1"/>
    <!-- 画面 -->
    <rect x="6" y="10" width="88" height="120" rx="4" fill="url(#phoneScreen)"/>
    <!-- チャットバブル示唆 -->
    <rect x="14" y="22" width="50" height="10" rx="5" fill="#fff" opacity="0.5"/>
    <rect x="14" y="38" width="38" height="10" rx="5" fill="#fff" opacity="0.4"/>
    <rect x="36" y="58" width="50" height="10" rx="5" fill="#5a3a26" opacity="0.6"/>
    <rect x="14" y="78" width="60" height="10" rx="5" fill="#fff" opacity="0.45"/>
  </g>
  <!-- 画面光のあふれ出し -->
  <ellipse cx="160" cy="120" rx="120" ry="50" fill="#f0b27a" opacity="0.12"/>
</svg>
