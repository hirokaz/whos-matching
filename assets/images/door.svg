<?xml version="1.0" encoding="UTF-8"?>
<!--
  玄関ドア — 最重要画像
  仕様: image-prompts.md「玄関（最重要）」
  - 中は見せない（暗闇で隠す）
  - 寒色・恐怖の入り口
  - 内部詳細は描かない
  Scene10 用。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" role="img" aria-label="玄関ドア、内部は暗くて見えない">
  <defs>
    <linearGradient id="bgDoor" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0a0d12"/>
      <stop offset="1" stop-color="#04060a"/>
    </linearGradient>
    <linearGradient id="doorPanel" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#1a1d22"/>
      <stop offset="0.5" stop-color="#252830"/>
      <stop offset="1" stop-color="#1a1d22"/>
    </linearGradient>
    <radialGradient id="hallLight" cx="0.5" cy="0.0" r="0.6">
      <stop offset="0" stop-color="#a8b4c0" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#a8b4c0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bgDoor)"/>
  <!-- 廊下のかすかな天井灯（青白い） -->
  <rect width="320" height="200" fill="url(#hallLight)"/>

  <!-- 廊下の床（手前） -->
  <polygon points="0,200 320,200 240,160 80,160" fill="#0a0c10"/>
  <line x1="80" y1="160" x2="0" y2="200" stroke="#1a1d22" stroke-width="1" opacity="0.3"/>
  <line x1="240" y1="160" x2="320" y2="200" stroke="#1a1d22" stroke-width="1" opacity="0.3"/>

  <!-- ドア枠 -->
  <rect x="100" y="30" width="120" height="135" fill="#0a0c10"/>

  <!-- ドア本体（少しだけ開いている） -->
  <g>
    <!-- ドア表面（左にわずかに開いた状態） -->
    <polygon points="105,35 215,35 205,160 110,160" fill="url(#doorPanel)"/>
    <!-- ドアパネル装飾（縦長） -->
    <rect x="120" y="50" width="80" height="40" fill="none" stroke="#0d1015" stroke-width="1.2" opacity="0.6"/>
    <rect x="120" y="100" width="80" height="50" fill="none" stroke="#0d1015" stroke-width="1.2" opacity="0.6"/>
    <!-- ドアノブ -->
    <circle cx="195" cy="100" r="3" fill="#5a6068" opacity="0.7"/>

    <!-- 開いた隙間の闇（重要：中は見せない） -->
    <polygon points="215,35 240,40 240,158 205,160" fill="#000"/>
    <!-- 隙間の縁にうっすら冷たい光 -->
    <line x1="216" y1="38" x2="216" y2="158" stroke="#2a3545" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- ドア前の冷たい影 -->
  <ellipse cx="160" cy="170" rx="80" ry="6" fill="#000" opacity="0.6"/>

  <!-- 全体トーン -->
  <rect width="320" height="200" fill="#0a1020" opacity="0.2"/>
</svg>
