<?xml version="1.0" encoding="UTF-8"?>
<!--
  夜の道（移動シーン）
  仕様: image-prompts.md - 寒色、違和感の入り口
  Scene9 用。街灯と空の道。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" role="img" aria-label="夜の住宅街の道">
  <defs>
    <linearGradient id="bgStreet" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0a0e18"/>
      <stop offset="0.5" stop-color="#10141e"/>
      <stop offset="1" stop-color="#1a1d22"/>
    </linearGradient>
    <radialGradient id="lampGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#c8d4e0" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#c8d4e0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bgStreet)"/>

  <!-- 遠景の建物シルエット -->
  <path d="M 0 130 L 30 130 L 30 100 L 60 100 L 60 120 L 90 120 L 90 105 L 130 105 L 130 125 L 170 125 L 170 110 L 200 110 L 200 130 L 240 130 L 240 115 L 280 115 L 280 130 L 320 130 L 320 200 L 0 200 Z" fill="#06080d"/>

  <!-- 道路（パース） -->
  <polygon points="120,200 200,200 175,130 145,130" fill="#0c0f15"/>
  <line x1="160" y1="135" x2="160" y2="160" stroke="#3a4555" stroke-width="2" opacity="0.4"/>
  <line x1="158" y1="170" x2="162" y2="195" stroke="#3a4555" stroke-width="3" opacity="0.5"/>

  <!-- 街灯1 -->
  <g transform="translate(70, 60)">
    <line x1="0" y1="0" x2="0" y2="80" stroke="#1a1d22" stroke-width="2"/>
    <line x1="0" y1="0" x2="20" y2="0" stroke="#1a1d22" stroke-width="2"/>
    <circle cx="22" cy="2" r="3" fill="#e8d8b0"/>
    <ellipse cx="22" cy="2" rx="40" ry="40" fill="url(#lampGlow)"/>
  </g>

  <!-- 街灯2（遠く） -->
  <g transform="translate(240, 80)">
    <line x1="0" y1="0" x2="0" y2="50" stroke="#1a1d22" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="14" y2="0" stroke="#1a1d22" stroke-width="1.5"/>
    <circle cx="16" cy="2" r="2" fill="#e8d8b0"/>
    <ellipse cx="16" cy="2" rx="28" ry="28" fill="url(#lampGlow)"/>
  </g>

  <!-- 空気感（霧） -->
  <rect width="320" height="200" fill="#1a2030" opacity="0.15"/>
</svg>
