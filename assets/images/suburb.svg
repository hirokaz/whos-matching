<?xml version="1.0" encoding="UTF-8"?>
<!--
  住宅街 — 違和感強化（夜）
  仕様: image-prompts.md「住宅街（違和感強化）」
  寒色・無人・静かな郊外を抽象表現。フル顔NGを遵守（人物そもそもなし）。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" role="img" aria-label="夜の住宅街、無人の路地">
  <defs>
    <linearGradient id="bgSuburb" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#070a12"/>
      <stop offset="0.7" stop-color="#0d1018"/>
      <stop offset="1" stop-color="#15171c"/>
    </linearGradient>
    <radialGradient id="suburbGlow" cx="0.5" cy="0.6" r="0.4">
      <stop offset="0" stop-color="#3a4555" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#3a4555" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bgSuburb)"/>

  <!-- 遠景：低層住宅シルエット（瓦屋根を示唆） -->
  <path d="M 0 140 L 30 140 L 30 120 L 50 110 L 70 120 L 70 140 L 100 140 L 100 115 L 130 100 L 160 115 L 160 140 L 200 140 L 200 125 L 220 115 L 240 125 L 240 140 L 280 140 L 280 130 L 300 122 L 320 130 L 320 200 L 0 200 Z" fill="#04060b"/>

  <!-- 道（細い路地） -->
  <polygon points="130,200 190,200 175,140 145,140" fill="#0a0c12"/>
  <line x1="160" y1="148" x2="160" y2="195" stroke="#2a3040" stroke-width="1" opacity="0.3"/>

  <!-- ぽつんと一つの窓明かり（家のどこか） -->
  <rect x="44" y="124" width="6" height="6" fill="#5a4a30" opacity="0.6"/>
  <rect x="220" y="128" width="4" height="5" fill="#5a4a30" opacity="0.4"/>

  <!-- 街灯（弱い） -->
  <g transform="translate(100, 90)">
    <line x1="0" y1="0" x2="0" y2="50" stroke="#1a1d22" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="2" fill="#a8b4c0" opacity="0.7"/>
    <ellipse cx="0" cy="0" rx="22" ry="22" fill="#3a4555" opacity="0.18"/>
  </g>

  <!-- 全体の冷気感 -->
  <rect width="320" height="200" fill="url(#suburbGlow)"/>
  <rect width="320" height="200" fill="#1a2030" opacity="0.18"/>
</svg>
