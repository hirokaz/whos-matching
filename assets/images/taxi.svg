<?xml version="1.0" encoding="UTF-8"?>
<!--
  タクシー内（移動）
  仕様: image-prompts.md - 寒色、夜の車内、窓に流れる街灯
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" role="img" aria-label="タクシー内、窓の外を流れる街灯">
  <defs>
    <linearGradient id="bgTaxi" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#06080d"/>
      <stop offset="1" stop-color="#0e1218"/>
    </linearGradient>
    <linearGradient id="windowG" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#1a2030"/>
      <stop offset="0.5" stop-color="#2a3550"/>
      <stop offset="1" stop-color="#1a2030"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bgTaxi)"/>
  <!-- 窓枠（車内側） -->
  <rect x="20" y="40" width="280" height="100" rx="8" fill="url(#windowG)"/>
  <!-- 窓の中 — 流れる光 -->
  <g opacity="0.9">
    <ellipse cx="60" cy="80" rx="20" ry="2" fill="#f0d090" opacity="0.6"/>
    <ellipse cx="120" cy="100" rx="30" ry="2" fill="#c8d4e0" opacity="0.5"/>
    <ellipse cx="200" cy="75" rx="40" ry="2" fill="#f0d090" opacity="0.55"/>
    <ellipse cx="270" cy="105" rx="25" ry="2" fill="#c8d4e0" opacity="0.45"/>
    <ellipse cx="160" cy="115" rx="50" ry="1.5" fill="#f0d090" opacity="0.4"/>
  </g>
  <!-- 窓ガラスの反射（薄い縦線） -->
  <line x1="80" y1="40" x2="100" y2="140" stroke="#fff" stroke-width="0.5" opacity="0.1"/>
  <line x1="220" y1="40" x2="240" y2="140" stroke="#fff" stroke-width="0.5" opacity="0.1"/>
  <!-- 車内（黒い天井・座席のシルエット） -->
  <rect x="0" y="0" width="320" height="40" fill="#06080d"/>
  <rect x="0" y="140" width="320" height="60" fill="#0a0c12"/>
  <!-- 前席ヘッドレスト示唆 -->
  <rect x="60" y="140" width="60" height="40" rx="8" fill="#06080d"/>
</svg>
