<?xml version="1.0" encoding="UTF-8"?>
<!--
  TVニュース（伏線回収）
  仕様: image-prompts.md「TVニュース」
  - 暗い部屋のテレビ画面
  - ニュース風レイアウト（テロップは具体性なし、ぼかし）
  - 詳細を読ませない（不安だけ残す）
  Scene17 / Scene17-tvon 用。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" role="img" aria-label="暗い部屋のテレビ画面、ニュース">
  <defs>
    <linearGradient id="bgTv" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#06060a"/>
      <stop offset="1" stop-color="#0a0a0c"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1a2030"/>
      <stop offset="1" stop-color="#0a1020"/>
    </linearGradient>
    <radialGradient id="screenGlow" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0" stop-color="#3a4555" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3a4555" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bgTv)"/>
  <!-- 部屋の床に届くTV光 -->
  <rect width="320" height="200" fill="url(#screenGlow)"/>

  <!-- TV筐体 -->
  <rect x="50" y="40" width="220" height="130" rx="6" fill="#0a0a0c" stroke="#15181c" stroke-width="2"/>
  <!-- スタンド -->
  <rect x="140" y="170" width="40" height="6" fill="#0a0a0c"/>
  <rect x="120" y="176" width="80" height="4" fill="#0a0a0c"/>

  <!-- 画面 -->
  <rect x="60" y="50" width="200" height="110" fill="url(#screenGrad)"/>

  <!-- ニュース風レイアウト（具体的な文字は描かない） -->
  <!-- ヘッダー帯（速報感） -->
  <rect x="60" y="50" width="200" height="14" fill="#5a1a1a" opacity="0.85"/>
  <rect x="68" y="54" width="40" height="6" fill="#fff" opacity="0.7"/>
  <rect x="116" y="54" width="80" height="6" fill="#fff" opacity="0.5"/>

  <!-- 中央：ぼやけた人影／街並み示唆 -->
  <ellipse cx="160" cy="100" rx="60" ry="22" fill="#3a4555" opacity="0.4"/>
  <rect x="100" y="115" width="120" height="3" fill="#a8b4c0" opacity="0.3"/>

  <!-- テロップ枠（下部・読めない文字） -->
  <rect x="60" y="138" width="200" height="22" fill="#0a0c12" opacity="0.85"/>
  <rect x="68" y="143" width="100" height="4" fill="#fff" opacity="0.6"/>
  <rect x="68" y="151" width="140" height="4" fill="#fff" opacity="0.4"/>

  <!-- 局ロゴ示唆（隅） -->
  <rect x="240" y="56" width="14" height="6" fill="#fff" opacity="0.3"/>

  <!-- 走査線（古いブラウン管っぽい雰囲気） -->
  <g opacity="0.18">
    <line x1="60" y1="65" x2="260" y2="65" stroke="#a8b4c0" stroke-width="0.4"/>
    <line x1="60" y1="80" x2="260" y2="80" stroke="#a8b4c0" stroke-width="0.4"/>
    <line x1="60" y1="95" x2="260" y2="95" stroke="#a8b4c0" stroke-width="0.4"/>
    <line x1="60" y1="110" x2="260" y2="110" stroke="#a8b4c0" stroke-width="0.4"/>
    <line x1="60" y1="125" x2="260" y2="125" stroke="#a8b4c0" stroke-width="0.4"/>
  </g>

  <!-- 部屋の闇 -->
  <rect width="320" height="200" fill="#000" opacity="0.25"/>
</svg>
