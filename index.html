<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <!--
    モバイル縦持ち最適化:
    - viewport-fit=cover で iPhone のセーフエリアに対応
    - user-scalable=no で意図しないピンチズームを抑止（チャットUIのため）
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#14110f" />
  <title>マッチしたのは、誰？</title>

  <style>
    /* =========================================================
     * カラートークン
     * ダーク基調 + 暖色アクセント（前半・恋愛モード想定）。
     * Chapter2 以降で別テーマに切り替えやすくするため CSS 変数化。
     * ========================================================= */
    :root {
      /* 背景・ベース */
      --color-bg: #14110f;          /* 画面全体の背景（深いダーク） */
      --color-bg-elev: #1d1916;     /* 一段持ち上がった面（ヘッダー/フッター） */
      --color-bg-chat: #181513;     /* チャットエリアの背景 */
      --color-surface: #2a2421;     /* バブル等の面 */
      --color-surface-2: #322b27;   /* 押下時 */

      /* テキスト */
      --color-text: #f5ece4;        /* 主要テキスト（暖色寄りの白） */
      --color-text-dim: #b9aea4;    /* 弱いテキスト */
      --color-text-muted: #7a7068;  /* さらに弱いテキスト（メタ情報） */

      /* アクセント（暖色） */
      --color-accent: #e8a064;      /* 主アクセント（オレンジ寄り） */
      --color-accent-strong: #f0b27a;
      --color-accent-dim: #c98750;

      /* バブル色分け */
      --color-bubble-partner: #2a2421;     /* 相手（左） */
      --color-bubble-protagonist: #5a3a26; /* 主人公（右）：暖色寄り */
      --color-narration: #8d8278;          /* 地の文（中央） */

      /* 選択肢ボタン: メッセージバブルと差別化するため寒色寄りニュートラル */
      --color-choice-bg: #1a1f26;
      --color-choice-bg-active: #232932;
      --color-choice-border: rgba(232, 160, 100, 0.28); /* 暖色アクセントを少量で「入力UI」と示す */
      --color-choice-text: #d6cfc7;

      /* レイアウト */
      --max-width: 480px;           /* スマホ縦持ち想定の最大幅 */
      --header-height: 48px;
      --footer-height: 56px;
      --radius-bubble: 14px;
      --radius-button: 10px;

      /* フォント */
      --font-base:
        -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN",
        "Yu Gothic", Meiryo, sans-serif;
    }

    /* リセット最小限 */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

    body {
      font-family: var(--font-base);
      font-size: 15px;
      line-height: 1.55;
      color: var(--color-text);
      background: var(--color-bg);
      /* スクロール挙動: チャット内のみスクロールするため body は固定 */
      overflow: hidden;
      /* セーフエリア（iPhone notch / home indicator）への配慮 */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      -webkit-tap-highlight-color: transparent;
    }

    /* =========================================================
     * アプリ全体のシェル
     * 縦に4エリア（ヘッダー / メイン / 選択肢 / フッター）を積む。
     * 中央寄せして max-width を制限することでタブレット/PCでも崩れない。
     * ========================================================= */
    .app {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: var(--max-width);
      height: 100dvh; /* dvh: モバイルブラウザのアドレスバー伸縮に追従 */
      margin: 0 auto;
      background: var(--color-bg);
      /* 端を視認しやすく（max-width を超える画面で背景と区別） */
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03);
    }

    /* ヘッダー -------------------------------------------------- */
    .app-header {
      flex: 0 0 var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px 0 12px;
      background: var(--color-bg-elev);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      gap: 8px;
    }
    /* タイトル + 進行を縦に積んでヘッダーを薄く保つ */
    .app-header__meta {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0; /* ellipsis を効かせるため */
      flex: 1 1 auto;
    }
    .app-header__title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .app-header__progress {
      font-size: 10.5px;
      color: var(--color-text-muted);
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
      margin-top: 2px;
    }
    /* AUTO トグル: 親指届きやすいよう右上、44px 確保 */
    .app-header__auto {
      flex: 0 0 auto;
      min-width: 56px;
      min-height: 36px;
      padding: 6px 10px;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--color-text-dim);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 120ms ease, background-color 120ms ease, border-color 120ms ease;
    }
    .app-header__auto::before {
      /* ON/OFF を視覚化する小さなインジケータ */
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-text-muted);
      transition: background-color 120ms ease, box-shadow 120ms ease;
    }
    .app-header__auto.is-on {
      color: var(--color-accent);
      border-color: var(--color-accent-dim);
      background: rgba(232,160,100,0.08);
    }
    .app-header__auto.is-on::before {
      background: var(--color-accent);
      box-shadow: 0 0 6px rgba(232,160,100,0.7);
    }

    /* メイン（チャット） --------------------------------------- */
    .app-main {
      flex: 1 1 auto;
      min-height: 0; /* flex子の overflow を効かせるため */
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--color-bg-chat);
      padding: 12px 12px 8px;
      /* スマホでの慣性スクロール */
      -webkit-overflow-scrolling: touch;
      /* タップで進行させるため、テキスト選択をデフォルト無効化（長押しでログ等を妨げない範囲で） */
      -webkit-user-select: none;
      user-select: none;
      cursor: pointer;
    }
    /* タイピング中のキャレット（疑似カーソル） */
    .msg__bubble.is-typing::after {
      content: '▍';
      display: inline-block;
      margin-left: 2px;
      opacity: 0.5;
      animation: caret-blink 900ms steps(2, end) infinite;
    }
    @keyframes caret-blink {
      from { opacity: 0.6; }
      to   { opacity: 0; }
    }

    /* チャット行（共通） */
    .msg {
      display: flex;
      margin-bottom: 8px;
      animation: msg-in 220ms ease-out;
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg__bubble {
      max-width: 78%;
      padding: 9px 12px;
      border-radius: var(--radius-bubble);
      word-wrap: break-word;
      white-space: pre-wrap;
      font-size: 14.5px;
    }
    /* 相手（左寄せ） */
    .msg--partner { justify-content: flex-start; }
    .msg--partner .msg__bubble {
      background: var(--color-bubble-partner);
      border-top-left-radius: 4px; /* 吹き出しの角ヒント */
      color: var(--color-text);
    }
    /* 主人公（右寄せ） */
    .msg--protagonist { justify-content: flex-end; }
    .msg--protagonist .msg__bubble {
      background: var(--color-bubble-protagonist);
      border-top-right-radius: 4px;
      color: var(--color-text);
    }
    /* 地の文（中央寄せ） */
    .msg--narration { justify-content: center; }
    .msg--narration .msg__bubble {
      background: transparent;
      color: var(--color-narration);
      font-size: 12.5px;
      text-align: center;
      max-width: 90%;
      font-style: italic;
    }

    /* 選択肢エリア --------------------------------------------- */
    .app-choices {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px 12px;
      background: var(--color-bg);
      border-top: 1px solid rgba(255,255,255,0.04);
      max-height: 45dvh; /* 多選択肢時に画面を埋め尽くさないように */
      overflow-y: auto;
    }
    .app-choices:empty {
      /* 選択肢が無い時は領域を消す */
      padding: 0;
      border-top: none;
    }
    /* 選択直後のフェードアウト演出（DOMクリア前に短時間フェード） */
    .app-choices.is-fading {
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }
    .choice-btn {
      width: 100%;
      /* min-height 44px: Apple HIG / Material のタップ目標サイズ最低基準 */
      min-height: 44px;
      padding: 12px 14px;
      text-align: left;
      /* メッセージバブル（暖色）と区別する寒色寄りニュートラル + 暖色アクセント縁 */
      background: var(--color-choice-bg);
      color: var(--color-choice-text);
      border-radius: var(--radius-button);
      border: 1px solid var(--color-choice-border);
      font-size: 14.5px;
      transition: background-color 160ms ease, border-color 160ms ease,
                  transform 80ms ease, opacity 200ms ease;
    }
    .choice-btn:active {
      background: var(--color-choice-bg-active);
      transform: scale(0.99);
    }
    .choice-btn--accent {
      /* 「進む」「次へ」のような確定的アクションに使う */
      background: var(--color-accent-dim);
      color: #1a120c;
      font-weight: 600;
      border-color: transparent;
    }
    .choice-btn--accent:active {
      background: var(--color-accent);
    }
    /* 選択直後の演出: 選んだボタンを強調 / 他をフェードアウト */
    .choice-btn.is-selected {
      background: var(--color-accent);
      color: #1a120c;
      border-color: var(--color-accent-strong);
      font-weight: 600;
    }
    .choice-btn.is-dimmed {
      opacity: 0.25;
    }
    .choice-btn[disabled] {
      pointer-events: none;
    }

    /* フッター（コントロール） --------------------------------- */
    .app-footer {
      flex: 0 0 var(--footer-height);
      display: flex;
      align-items: center;
      justify-content: space-around;
      gap: 4px;
      padding: 0 8px;
      background: var(--color-bg-elev);
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .ctrl-btn {
      flex: 1;
      /* タップ目標サイズ確保（44x44 推奨）。フッター高 56 + padding で 44 を担保 */
      min-height: 44px;
      padding: 8px 4px;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--color-text-dim);
      border-radius: 8px;
    }
    .ctrl-btn:active { background: var(--color-surface); }
    .ctrl-btn.is-active { color: var(--color-accent); }

    /* =========================================================
     * モーダル（LOG / MENU 共通）
     * 仕様: ui-spec.md「コントロールバー: LOG / MENU」
     * 全画面オーバーレイ + 中央パネル（max-width 抑制）。
     * チャット領域だけ覆い、ヘッダー/フッターも遮るため fixed で全面に出す。
     * ========================================================= */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: stretch;
      justify-content: center;
      z-index: 100;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }
    .modal.is-open { display: flex; }
    .modal__panel {
      width: 100%;
      max-width: var(--max-width);
      background: var(--color-bg-elev);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }
    .modal__header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .modal__title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--color-text);
    }
    .modal__close {
      min-width: 44px;
      min-height: 44px;
      padding: 8px 12px;
      font-size: 18px;
      color: var(--color-text-dim);
      border-radius: 8px;
    }
    .modal__close:active { background: var(--color-surface); }
    .modal__body {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 10px 12px;
      -webkit-overflow-scrolling: touch;
    }

    /* LOGモーダル内の発話表示 */
    .log-entry {
      padding: 6px 0;
      border-bottom: 1px dashed rgba(255,255,255,0.04);
      font-size: 13px;
      line-height: 1.5;
      color: var(--color-text);
    }
    .log-entry__meta {
      display: block;
      font-size: 10px;
      color: var(--color-text-muted);
      letter-spacing: 0.06em;
      margin-bottom: 2px;
      text-transform: uppercase;
    }
    .log-entry--protagonist .log-entry__meta { color: var(--color-accent-dim); }
    .log-entry--narration {
      color: var(--color-narration);
      font-style: italic;
      text-align: center;
    }
    .log-entry--choice .log-entry__text {
      color: var(--color-accent);
      font-weight: 600;
    }
    .log-empty {
      text-align: center;
      color: var(--color-text-muted);
      padding: 24px 0;
      font-size: 13px;
    }

    /* MENU モーダル */
    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      background: var(--color-surface);
      color: var(--color-text);
      border-radius: var(--radius-button);
      font-size: 14px;
      text-align: left;
      transition: background-color 120ms ease;
    }
    .menu-item:active { background: var(--color-surface-2); }
    .menu-item__hint {
      color: var(--color-text-muted);
      font-size: 11px;
    }
    .menu-section-label {
      font-size: 10.5px;
      color: var(--color-text-muted);
      letter-spacing: 0.08em;
      margin: 12px 0 4px;
      text-transform: uppercase;
    }
    /* AUTO 速度切替（セグメント） */
    .speed-seg {
      display: flex;
      gap: 6px;
    }
    .speed-seg__btn {
      flex: 1;
      min-height: 44px;
      padding: 8px 0;
      background: var(--color-surface);
      border: 1px solid rgba(255,255,255,0.05);
      color: var(--color-text-dim);
      border-radius: var(--radius-button);
      font-size: 12px;
      letter-spacing: 0.04em;
    }
    .speed-seg__btn.is-active {
      background: var(--color-accent-dim);
      color: #1a120c;
      border-color: transparent;
      font-weight: 600;
    }
    .speed-seg__btn:active { background: var(--color-surface-2); }
    .speed-seg__btn.is-active:active { background: var(--color-accent); }

    /* 画面が縦に小さい時の調整（例: 横向き） */
    @media (orientation: landscape) and (max-height: 500px) {
      .app-choices { max-height: 60dvh; }
    }

    /* =========================================================
     * 画像差し込み（Phase 4 / #30）
     * ---------------------------------------------------------
     * メッセージの直前に表示する状況画像。
     * - 縦長スマホでも視界を奪いすぎないよう高さ制限。
     * - SVG はビューポートを覆うように cover 表示。
     * - 暖色/寒色の境界をはっきりさせるため軽い影を入れる。
     * ========================================================= */
    .scene-image {
      width: 100%;
      max-width: 100%;
      margin: 4px 0 10px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset,
                  0 4px 16px rgba(0,0,0,0.4);
      animation: scene-image-in 360ms ease-out;
      /* スマホでもアスペクト比固定で安定表示 */
      aspect-ratio: 16 / 10;
      background: #0a0c10;
    }
    .scene-image > svg {
      display: block;
      width: 100%;
      height: 100%;
    }
    @keyframes scene-image-in {
      from { opacity: 0; transform: translateY(4px) scale(0.99); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* =========================================================
     * 特殊効果 Lv1〜3（Phase 4 / #28）
     * 仕様: docs/ui-spec.md「特殊効果設計」
     *
     * Lv1（前半）  : 暖色・安定・ぼかしなし
     * Lv2（中盤）  : 色温度低下・軽いノイズ・微妙な不規則性
     * Lv3（後半）  : 画面揺れ・寒色・暗いUI
     * 玄関演出     : 音消失（彩度低下）・テキスト間が伸びる・背景暗転
     *
     * クラスは <body> に付与（.effect-lv-1 / -2 / -3 / .effect-entrance）。
     * effect の切替時に既存クラスを掃除して新しい1つだけを付ける。
     * ========================================================= */

    /* Lv1: 既存ベースカラーそのまま。アクセントを少し強めに。 */
    body.effect-lv-1 {
      /* なにも変えない。安定。 */
    }

    /* Lv2: 色温度を下げる + 軽いノイズ
       色温度低下: hue-rotate でわずかに寒色寄り、saturate で彩度を抑える。
       ノイズ:   ::after で SVG 風 noise の極薄パターン。 */
    body.effect-lv-2 .app {
      filter: saturate(0.85) hue-rotate(-8deg);
      transition: filter 800ms ease;
    }
    body.effect-lv-2 .app::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      /* SVG turbulence をデータURLで埋め込む。極薄 opacity で違和感だけ出す。 */
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.9 0 0 0 0 0.9 0 0 0 0 0.95 0 0 0 0.7 0'/></filter><rect width='160' height='160' filter='url(%23n)' opacity='0.55'/></svg>");
      mix-blend-mode: overlay;
      opacity: 0.18;
    }
    /* .app に position:relative を後付けする（既存はデフォルト static） */
    body.effect-lv-2 .app,
    body.effect-lv-3 .app,
    body.effect-entrance .app {
      position: relative;
    }

    /* Lv3: 寒色・画面揺れ・暗UI
       揺れは「ごく小さく」「不規則に」。脳が酔わない範囲。 */
    body.effect-lv-3 {
      /* 後半は背景・サーフェスを寒色寄りに上書き */
      --color-bg:        #07090e;
      --color-bg-elev:   #0c0f15;
      --color-bg-chat:   #080b10;
      --color-surface:   #161a22;
      --color-surface-2: #1c2230;
      --color-text:      #d8dde4;
      --color-text-dim:  #8a93a0;
      --color-text-muted:#5a626c;
      --color-accent:    #6a90c0;
      --color-accent-strong: #88aadd;
      --color-accent-dim:#3e5778;
      --color-bubble-partner: #181d26;
      --color-bubble-protagonist: #1f2a3c;
      --color-narration: #5e6878;
    }
    body.effect-lv-3 .app {
      animation: ui-shake-tiny 6.5s ease-in-out infinite;
      transition: background-color 800ms ease;
    }
    @keyframes ui-shake-tiny {
      /* 6.5s 周期で「不規則」に微震する。1pxを超えない */
      0%   { transform: translate(0, 0); }
      8%   { transform: translate(0.5px, -0.5px); }
      16%  { transform: translate(-0.5px, 0.3px); }
      24%  { transform: translate(0.4px, 0.5px); }
      30%  { transform: translate(0, 0); }
      45%  { transform: translate(0.6px, 0); }
      52%  { transform: translate(-0.6px, -0.4px); }
      60%  { transform: translate(0, 0); }
      75%  { transform: translate(-0.3px, 0.5px); }
      82%  { transform: translate(0.5px, 0.4px); }
      100% { transform: translate(0, 0); }
    }
    /* スタンガン等のフラッシュ：一時的に最前面で白く点滅 */
    .effect-flash {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #fff;
      pointer-events: none;
      opacity: 0;
      animation: flash-burst 900ms ease-out forwards;
    }
    @keyframes flash-burst {
      0%   { opacity: 0; }
      8%   { opacity: 1; }
      14%  { opacity: 0.4; }
      20%  { opacity: 1; }
      40%  { opacity: 0; }
      60%  { opacity: 0.6; background: #c8d4e0; }

    }

    /* 玄関演出：背景暗転 + テキスト間が伸びる + 彩度ゼロ（音消失の代替）
       Lv2/Lv3 と排他ではなく「上乗せ」して使う想定。 */
    body.effect-entrance .app {

    /* ============================================================

    .title-screen {

<body>
  <!--
    タイトル画面（Phase 4 / #29）
    起動時に表示。性別・名前を選択して「はじめる」で SceneEngine を起動。
    保存済みデータがある場合は「続きから」で復帰。
  -->
  <div class="title-screen" id="title-screen" aria-hidden="true">
    <div class="title-screen__panel">
      <div class="title-screen__title">マッチしたのは、誰？</div>
      <div class="title-screen__subtitle">——あの人の好意は、本物だったのか。</div>

      <div class="title-section">
        <div class="title-section__label">主人公の性別</div>
        <div class="title-gender" role="radiogroup" aria-label="主人公の性別">
          <button class="title-gender__btn is-active" type="button" data-gender="female" role="radio" aria-checked="true">女性</button>
          <button class="title-gender__btn" type="button" data-gender="male" role="radio" aria-checked="false">男性</button>
        </div>

      <div class="title-section">
        <div class="title-section__label">名前（任意）</div>
        <input
          class="title-name__input"
          id="title-name-input"
          type="text"
          inputmode="text"
          maxlength="12"
          autocomplete="off"

        <button class="title-action-btn" type="button" id="title-continue" disabled>続きから</button>
      </div>

      <div class="title-foot">© Whos-Matching</div>
    </div>
  </div>

  <!--
    ゲーム本体のルート。
    4エリア構成（仕様: ui-spec.md の「画面レイアウト」）:
      1. <header>  ヘッダー（タイトル / 進行 / AUTO トグル）
      2. <main>    チャット表示エリア（タイピング演出 + タップ進行）
      3. <section> 選択肢エリア（最大4択、AUTO 強制停止）
      4. <footer>  コントロールバー（AUTO / SKIP / LOG / MENU）
    Phase 2 で UI 実装済み。Phase 3 で本番シナリオ、Phase 4 で仕上げ。
  -->
  <div class="app is-hidden" id="app">

    <header class="app-header">
      <!--
        左側にタイトル＋進行を縦積み。スマホ縦持ちで上部スペースを節約しつつ、
        右側に AUTO トグルを置いて親指で押しやすくする。
      -->
      <div class="app-header__meta">
        <div class="app-header__title">マッチしたのは、誰？</div>
        <div class="app-header__progress" id="header-progress">Ch.- / Scene -</div>
      </div>
      <button
        class="app-header__auto"
        type="button"
        id="auto-toggle"
        aria-pressed="false"
        aria-label="AUTOモード切替"

    <main class="app-main" id="chat-area" aria-live="polite">
      <!-- チャットメッセージはここに動的追加される -->
    </main>

    <section class="app-choices" id="choices" aria-label="選択肢">
      <!-- 選択肢ボタンはここに動的追加される -->
    </section>

    <footer class="app-footer">
      <!--
        4ボタン: AUTO / SKIP / LOG / MENU
        AUTO はヘッダーのトグルと同期。SKIPは1メッセージ進行（タイピング即完了 or 次へ）。
      -->
      <button class="ctrl-btn" type="button" data-ctrl="auto" id="ctrl-auto">AUTO</button>
      <button class="ctrl-btn" type="button" data-ctrl="skip" id="ctrl-skip">SKIP</button>
      <button class="ctrl-btn" type="button" data-ctrl="log" id="ctrl-log">LOG</button>
      <button class="ctrl-btn" type="button" data-ctrl="menu" id="ctrl-menu">MENU</button>
    </footer>

  </div>

  <!-- ===========================================================
       LOG モーダル
       過去の発話を時系列で振り返るためのオーバーレイ。
       =========================================================== -->
  <div class="modal" id="modal-log" aria-hidden="true" role="dialog" aria-labelledby="modal-log-title">
    <div class="modal__panel">
      <div class="modal__header">
        <div class="modal__title" id="modal-log-title">LOG</div>
        <button class="modal__close" type="button" data-modal-close="modal-log" aria-label="閉じる">×</button>
      </div>
      <div class="modal__body" id="modal-log-body">
        <!-- ログエントリは動的生成 -->
      </div>
    </div>
  </div>

  <!-- ===========================================================
       MENU モーダル
       タイトルへ戻る / 最初から / AUTO速度設定。
       =========================================================== -->
  <div class="modal" id="modal-menu" aria-hidden="true" role="dialog" aria-labelledby="modal-menu-title">
    <div class="modal__panel">
      <div class="modal__header">
        <div class="modal__title" id="modal-menu-title">MENU</div>
        <button class="modal__close" type="button" data-modal-close="modal-menu" aria-label="閉じる">×</button>
      </div>
      <div class="modal__body">
        <div class="menu-section-label">AUTO 速度</div>
        <div class="speed-seg" id="menu-speed">
          <button class="speed-seg__btn" type="button" data-speed="slow">低速</button>
          <button class="speed-seg__btn" type="button" data-speed="normal">標準</button>
          <button class="speed-seg__btn" type="button" data-speed="fast">高速</button>
        </div>

        <div class="menu-section-label">進行</div>
        <div class="menu-list">
          <button class="menu-item" type="button" data-menu="restart">
            <span>最初から</span>
            <span class="menu-item__hint">セーブを破棄して開始</span>
          </button>
          <button class="menu-item" type="button" data-menu="title">
            <span>タイトルへ戻る</span>
            <span class="menu-item__hint">画面を再読込</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
  /* =================================================================
   * WhosMatching: グローバル名前空間
   * Phase 1 では以下の3モジュールを公開する:
   *   - WhosMatching.GameState : 状態管理 + LocalStorage 永続化
   *   - WhosMatching.SceneEngine : シーン進行エンジン
   *   - WhosMatching.UI : 最低限の表示ハンドラ（Phase 1 動作確認用）
   *
   * モジュール間は「イベントエミッタ（簡易）」で疎結合にする。
   * UI 実装フェーズで UI を差し替えられるようにするため。
   * ================================================================= */
  (function (global) {
    'use strict';

    const NS = (global.WhosMatching = global.WhosMatching || {});

    /* ---------------------------------------------------------------
     * Emitter: 超簡易イベントエミッタ
     * SceneEngine が UI に通知するための仕組み。
     * 過剰実装を避けるため on/off/emit のみ。
     * --------------------------------------------------------------- */
    function createEmitter() {
      const handlers = Object.create(null);
      return {
        on(event, fn) {
          (handlers[event] || (handlers[event] = [])).push(fn);
        },
        off(event, fn) {
          const list = handlers[event];
          if (!list) return;
          const i = list.indexOf(fn);
          if (i >= 0) list.splice(i, 1);
        },
        emit(event, payload) {
          const list = handlers[event];
          if (!list) return;
          // 配列のコピーを取って反復中の追加/削除に耐える
          list.slice().forEach((fn) => {
            try { fn(payload); }
            catch (e) { console.error('[emitter]', event, e); }
          });
        },
      };
    }
    NS.createEmitter = createEmitter;

    /* ===============================================================
     * GameState
     * フラグ・内部変数・進行情報を保持。LocalStorage に永続化する。
     * 仕様: docs/scenario-game-spec.md
     *
     * フラグ:
     *   F_workCare  (0..2)
     *   F_empathy   (0..3)
     *   F_honesty   (-2..2)
     *   F_intervene (0..3)
     * 内部変数:
     *   Trust    (0..5)
     *   Interest (0..5)
     *   Risk     (0..5)
     * その他:
     *   sceneId         : 現在シーンID
     *   protagonist     : { gender: 'female'|'male', name: string }
     *   log             : 表示済みメッセージのログ
     *   ending          : null | 'GOOD'|'ESCAPE'|'BAD'|'LOST'
     * =============================================================== */

    // 値域定義。範囲外はクランプする（仕様準拠）。
    const RANGES = Object.freeze({
      F_workCare:  [0, 2],
      F_empathy:   [0, 3],
      F_honesty:   [-2, 2],
      F_intervene: [0, 3],
      Trust:       [0, 5],
      Interest:    [0, 5],
      Risk:        [0, 5],
    });

    // 永続化キー。スキーマ変更時はサフィックスを上げる。
    const STORAGE_KEY = 'whos-matching/save-v1';

    // 初期状態を毎回新しいオブジェクトとして返す（参照共有を避ける）。
    function createInitialState() {
      return {
        // フラグ（Chapter1）
        F_workCare:  0,
        F_empathy:   0,
        F_honesty:   0,
        F_intervene: 0,
        // 内部変数（Chapter2）
        Trust:    0,
        Interest: 0,
        Risk:     0,
        // 進行
        sceneId: null,
        // 主人公（デフォルト: 女性「美咲」。男性は character-spec.md に従い「拓海」）
        protagonist: { gender: 'female', name: '美咲' },
        // ログ履歴（{speaker, text, sceneId}[]）
        log: [],
        // エンディング判定（Scene18 で確定）
        ending: null,
      };
    }

    function clamp(value, min, max) {
      if (value < min) return min;
      if (value > max) return max;
      return value;
    }

    const GameState = (function () {
      // 内部状態（外部から直接書き換えられないようクロージャに閉じる）
      let state = createInitialState();

      function get(key) {
        // 浅いコピーは不要（プリミティブ中心）。オブジェクトのみ複製して返す。
        const v = state[key];
        if (v && typeof v === 'object') {
          return Array.isArray(v) ? v.slice() : Object.assign({}, v);
        }
        return v;
      }

      function getAll() {
        // デバッグ用。ログ等を含む浅いコピー。
        return JSON.parse(JSON.stringify(state));
      }

      function set(key, value) {
        if (key in RANGES) {
          const [min, max] = RANGES[key];
          state[key] = clamp(value, min, max);
        } else {
          // 範囲定義外（sceneId, protagonist, log, ending 等）はそのまま代入
          state[key] = value;
        }
        return state[key];
      }

      function update(key, delta) {
        if (!(key in RANGES)) {
          throw new Error('GameState.update: ' + key + ' は数値範囲が定義されていません');
        }
        const [min, max] = RANGES[key];
        state[key] = clamp(state[key] + delta, min, max);
        return state[key];
      }

      // ログ追加（履歴保持）
      function appendLog(entry) {
        state.log.push(entry);
        // 過大化防止: 直近 500 件まで（Phase 1 程度では十分）
        if (state.log.length > 500) state.log.splice(0, state.log.length - 500);
      }

      // 永続化
      function save() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
          return true;
        } catch (e) {
          // QuotaExceeded やプライベートモード等。Phase 1 ではログのみ。
          console.warn('[GameState.save] failed:', e);
          return false;
        }
      }

      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return false;
          const parsed = JSON.parse(raw);
          // 初期状態にマージ（旧スキーマで欠落キーがあっても落ちないように）
          state = Object.assign(createInitialState(), parsed);
          // protagonist は入れ子なので個別にマージ
          state.protagonist = Object.assign(
            { gender: 'female', name: '美咲' },
            parsed.protagonist || {}
          );
          if (!Array.isArray(state.log)) state.log = [];
          return true;
        } catch (e) {
          console.warn('[GameState.load] failed:', e);
          return false;
        }
      }

      function reset() {
        state = createInitialState();
        try { localStorage.removeItem(STORAGE_KEY); } catch (_) { /* noop */ }
      }

      return {
        get, getAll, set, update,
        appendLog,
        save, load, reset,
        // 定数も公開（テスト・UIから参照可能に）
        RANGES, STORAGE_KEY,
      };
    })();

    NS.GameState = GameState;

    /* ===============================================================
     * Scene データ構造（型コメント）
     * ---------------------------------------------------------------
     * シーンは「メッセージ列 + 末尾アクション」で構成する。
     * speaker は表示位置を決定:
     *   - 'partner'     左
     *   - 'protagonist' 右
     *   - 'narration'   中央（地の文）
     *
     * @typedef {Object} Message
     * @property {'partner'|'protagonist'|'narration'} speaker
     * @property {string} text
     * @property {number} [speed]   1文字あたり ms（演出速度）。未指定はデフォルト値
     * @property {1|2|3} [effect]   特殊効果Lv（1:前半 / 2:中盤 / 3:後半）
     * @property {string} [tone]    色温度 'warm'|'neutral'|'cold'（演出ヒント）
     *
     * @typedef {Object} Choice
     * @property {string} label                 ボタンに表示するテキスト
     * @property {Object<string,number>} [flags]    フラグ加減算 { F_empathy: 1, ... }
     * @property {Object<string,number>} [vars]     内部変数加減算 { Trust: 1, ... }
     * @property {string} next                  次シーンID
     *
     * @typedef {Object} Scene
     * @property {string} id
     * @property {'message'|'choice'|'forced'|'scene-transition'} type
     *   - 'choice'           : 末尾に選択肢を出す
     *   - 'forced'           : 選択肢なしで「進む」のみ（演出上の強制進行）
     *   - 'scene-transition' : 即座に next へ遷移（演出/分岐ハブ用）
     *   - 'message'          : 'forced' と同義（メッセージ完了で next）
     * @property {Message[]} [messages]         表示する発話列
     * @property {Choice[]}  [choices]          type === 'choice' 時のみ
     * @property {string}    [next]             type === 'forced' / 'message' / 'scene-transition' 時の遷移先
     * =============================================================== */

    /* ===============================================================
     * SceneEngine
     * シーンデータを読み込み、進行を制御する。
     *
     * 公開API:
     *   loadScenes(scenesById)
     *   start(sceneId)
     *   getCurrentScene()
     *   advance()              次の発話 / 選択肢表示 / 遷移へ進める
     *   choose(choiceIndex)    選択肢を確定してフラグ反映 + 遷移
     *   forceTransition(id)    任意シーンへ強制遷移
     *   on(event, handler)     'message'|'choices'|'sceneChange'|'end'
     *
     * 設計方針:
     *   - エンジンは UI を持たない。表示はイベントを購読した側で行う。
     *   - 状態の永続化はシーン変更時に GameState.save() を呼ぶ（自動保存）。
     * =============================================================== */
    const SceneEngine = (function () {
      const emitter = createEmitter();

      let scenes = Object.create(null); // id -> Scene
      let current = null;               // 現在の Scene
      let cursor = 0;                   // 現在のメッセージインデックス

      function loadScenes(scenesById) {
        scenes = scenesById || Object.create(null);
      }

      function getCurrentScene() {
        return current;
      }

      function _enterScene(sceneId) {
        const scene = scenes[sceneId];
        if (!scene) {
          console.error('[SceneEngine] 未定義のシーンID:', sceneId);
          emitter.emit('end', { reason: 'missing-scene', sceneId });
          return;
        }
        current = scene;
        cursor = 0;

        // GameState を更新 + 自動保存（仕様: シーン遷移時に自動保存）
        GameState.set('sceneId', sceneId);

        // onEnter フック: シーン突入直前に状態を操作したい場合に使う。
        // 例: Chapter1→Chapter2 のフラグ→内部変数変換、エンディング判定、
        //     条件分岐ハブでの内部変数の事前計算など。
        // 第1引数: GameState、第2引数: SceneEngine 内部 API（forceTransition のみ公開）。
        if (typeof scene.onEnter === 'function') {
          try {
            scene.onEnter(GameState, { forceTransition });
          } catch (e) {
            console.error('[SceneEngine.onEnter]', sceneId, e);
          }
        }

        // 自動保存（onEnter 後の状態を保存）
        GameState.save();

        emitter.emit('sceneChange', { sceneId, scene });

        // scene-transition は即座に次へ（メッセージを持たないハブ）
        // next は文字列または関数（GameState を受け取り次シーンIDを返す）。
        if (scene.type === 'scene-transition') {
          const nextId = _resolveNext(scene);
          if (nextId) _enterScene(nextId);
          else emitter.emit('end', { reason: 'transition-no-next', sceneId });
          return;
        }

        // 最初のメッセージを発火（あれば）
        if (scene.messages && scene.messages.length > 0) {
          _emitMessage();
        } else {
          // メッセージが無い場合は即座に末尾アクションへ
          _emitEndOfMessages();
        }
      }

      // next が関数なら GameState を渡して評価し、文字列ならそのまま返す。
      function _resolveNext(scene) {
        if (!scene) return null;
        if (typeof scene.next === 'function') {
          try { return scene.next(GameState); }
          catch (e) { console.error('[SceneEngine._resolveNext]', e); return null; }
        }
        return scene.next || null;
      }

      function _emitMessage() {
        const msg = current.messages[cursor];
        // ログ保持
        GameState.appendLog({
          speaker: msg.speaker,
          text: msg.text,
          sceneId: current.id,
        });
        emitter.emit('message', {
          message: msg,
          index: cursor,
          total: current.messages.length,
          sceneId: current.id,
        });
      }

      function _emitEndOfMessages() {
        // メッセージ列を消化したら、シーン種別に応じて次の動作を発火
        if (current.type === 'choice') {
          emitter.emit('choices', {
            choices: current.choices || [],
            sceneId: current.id,
          });
        } else {
          // 'forced' / 'message' / それ以外: 「進む」を提示
          emitter.emit('forced', {
            next: _resolveNext(current),
            sceneId: current.id,
          });
        }
      }

      // 次の発話へ。発話を出し切ったら末尾アクションを通知。
      function advance() {
        if (!current) return;
        if (!current.messages || current.messages.length === 0) {
          _emitEndOfMessages();
          return;
        }
        cursor += 1;
        if (cursor < current.messages.length) {
          _emitMessage();
        } else {
          _emitEndOfMessages();
        }
      }

      // 選択肢を確定してフラグ・内部変数を反映、次シーンへ。
      function choose(choiceIndex, sayText) {
        if (!current || current.type !== 'choice') {
          console.warn('[SceneEngine.choose] 現在のシーンは選択肢を持たない');
          return;
        }
        const choice = (current.choices || [])[choiceIndex];
        if (!choice) {
          console.warn('[SceneEngine.choose] 不正なインデックス:', choiceIndex);
          return;
        }

        // フラグ加減算
        if (choice.flags) {
          for (const k in choice.flags) {
            GameState.update(k, choice.flags[k]);
          }
        }
        // 内部変数加減算
        if (choice.vars) {
          for (const k in choice.vars) {
            GameState.update(k, choice.vars[k]);
          }
        }

        // 選択した内容をログに記録。
        // sayText（UI側で解決した自然な台詞）が渡されればそれを優先、
        // 無ければ choice.say、それも無ければ choice.label にフォールバック。
        const logText = sayText || choice.say || choice.label;
        GameState.appendLog({
          speaker: 'protagonist',
          text: logText,
          sceneId: current.id,
          choice: true,
        });

        // 遷移（choice.next も関数を許可）
        const nextId = (typeof choice.next === 'function')
          ? choice.next(GameState)
          : choice.next;
        if (nextId) {
          _enterScene(nextId);
        } else {
          emitter.emit('end', { reason: 'choice-no-next', sceneId: current.id });
        }
      }

      // 強制遷移（演出やデバッグ用）
      function forceTransition(sceneId) {
        _enterScene(sceneId);
      }

      // 「forced」末尾アクションから次シーンへ進める
      function proceedForced() {
        if (!current) return;
        const nextId = _resolveNext(current);
        if (nextId) _enterScene(nextId);
        else emitter.emit('end', { reason: 'forced-no-next', sceneId: current.id });
      }

      function start(sceneId) {
        _enterScene(sceneId);
      }

      return {
        loadScenes, start,
        getCurrentScene,
        advance, choose, forceTransition, proceedForced,
        on:  emitter.on,
        off: emitter.off,
      };
    })();

    NS.SceneEngine = SceneEngine;

    /* ===============================================================
     * Chapter1 → Chapter2 変換ロジック
     * ---------------------------------------------------------------
     * 仕様: docs/scenario-game-spec.md「Chapter2 開始時の初期変換」
     *
     *   Trust    = 1 + F_empathy + max(F_honesty, 0)
     *   Interest = 1 + F_intervene + (F_workCare <= 1 ? 1 : 0)
     *   Risk     = 1 + max(-F_honesty, 0) + (F_empathy === 0 ? 1 : 0)
     *
     * GameState.set は 0..5 にクランプする。
     * デバッグ用に変換結果をコンソールに出力する。
     * =============================================================== */
    function transitionToChapter2() {
      const F_workCare  = GameState.get('F_workCare');
      const F_empathy   = GameState.get('F_empathy');
      const F_honesty   = GameState.get('F_honesty');
      const F_intervene = GameState.get('F_intervene');

      const trust    = 1 + F_empathy + Math.max(F_honesty, 0);
      const interest = 1 + F_intervene + (F_workCare <= 1 ? 1 : 0);
      const risk     = 1 + Math.max(-F_honesty, 0) + (F_empathy === 0 ? 1 : 0);

      // GameState.set 内でクランプされる
      GameState.set('Trust',    trust);
      GameState.set('Interest', interest);
      GameState.set('Risk',     risk);

      // デバッグ出力（仕様確認用）
      console.log('[transitionToChapter2] flags:', {
        F_workCare, F_empathy, F_honesty, F_intervene,
      });
      console.log('[transitionToChapter2] vars (raw):', {
        Trust: trust, Interest: interest, Risk: risk,
      });
      console.log('[transitionToChapter2] vars (clamped):', {
        Trust:    GameState.get('Trust'),
        Interest: GameState.get('Interest'),
        Risk:     GameState.get('Risk'),
      });
    }
    NS.transitionToChapter2 = transitionToChapter2;

    /* ===============================================================
     * エンディング判定
     * ---------------------------------------------------------------
     * 仕様: docs/scenario-game-spec.md「エンディング条件」
     * =============================================================== */
    function determineEnding() {
      const Trust    = GameState.get('Trust');
      const Interest = GameState.get('Interest');
      const Risk     = GameState.get('Risk');
      let ending;
      if (Trust >= 4 && Risk <= 2) {
        ending = 'GOOD';
      } else if (Risk <= 3 && Interest >= 3) {
        ending = 'ESCAPE';
      } else if (Interest >= 5 && Trust <= 2) {
        ending = 'LOST';
      } else {
        ending = 'BAD';
      }
      console.log('[determineEnding] vars:', { Trust, Interest, Risk }, '=>', ending);
      return ending;
    }
    NS.determineEnding = determineEnding;

    /* ===============================================================

     * =============================================================== */

    // 画像カテゴリ → assets/images/*.svg のマップ。
    // 'opposite-profile' は性別反転で profile-male/female を返す論理キー。
    // 仕様: docs/image-prompts.md の各カテゴリに対応。
    const IMAGE_MAP = Object.freeze({
      'profile-male':    'assets/images/profile-male.svg',
      'profile-female':  'assets/images/profile-female.svg',
      'cafe':            'assets/images/cafe.svg',
      'chat-mood':       'assets/images/chat-mood.svg',
      'street-night':    'assets/images/street-night.svg',
      'taxi':            'assets/images/taxi.svg',
      'suburb':          'assets/images/suburb.svg',
      'door':            'assets/images/door.svg',
      'wall-photos':     'assets/images/wall-photos.svg',
      'blurred-vision':  'assets/images/blurred-vision.svg',
      'tv-news':         'assets/images/tv-news.svg',
    });
    NS.IMAGE_MAP = IMAGE_MAP;

    /**
     * 主人公性別に応じた「相手のプロフィール画像カテゴリ」を返す。
     * 仕様: character-spec.md「主人公の性別に応じて変化（基本は異性）」
     *   主人公=女性 → 相手=男性 → 'profile-male'
     *   主人公=男性 → 相手=女性 → 'profile-female'
     */
    function getOppositeProfile(state) {
      const p = state.get('protagonist') || {};
      return p.gender === 'male' ? 'profile-female' : 'profile-male';
    }
    NS.getOppositeProfile = getOppositeProfile;

    /**
     * 画像カテゴリ → SVG ファイルパスへ解決。
     * 'opposite-profile' は性別を見て反転、未知のキーは null。
     */
    function resolveImagePath(imageKey, state) {
      if (!imageKey) return null;
      let key = imageKey;
      if (key === 'opposite-profile') key = getOppositeProfile(state);
      return IMAGE_MAP[key] || null;
    }
    NS.resolveImagePath = resolveImagePath;

    /**
     * メッセージテキスト中のプレースホルダを置換する。
     * 仕様: 「内面・性格・行動特性は性別を問わず共通」を維持しつつ、
     *       表現上の代名詞だけを切替える（最小限の介入）。
     *
     * 置換ルール:
     *   {主人公名} → 主人公の名前
     *   {相手}    → 相手（性別中立な表現として「相手」固定。表現の一貫性のため）
     *   {彼}      → 主人公=女性 → 「彼」（相手）／主人公=男性 → 「彼女」（相手）
     *   {彼女}    → 主人公=女性 → 「彼女」（自分側）／主人公=男性 → 「彼」（自分側）
     *   {私}      → 主人公=女性 → 「私」／主人公=男性 → 「俺」
     *
     * メモ: シナリオ本文では極力プレースホルダを使わず、必要な箇所のみ置換。
     */
    function applyPronouns(text, state) {
      if (!text || text.indexOf('{') === -1) return text;
      const p = state.get('protagonist') || { gender: 'female', name: '美咲' };
      const isFemale = p.gender !== 'male';
      const name = p.name || (isFemale ? '美咲' : '拓海');
      // 「相手側の三人称」と「主人公の一人称」の両軸を切替える
      const otherPronoun = isFemale ? '彼'   : '彼女';
      const selfPronoun  = isFemale ? '彼女' : '彼';
      const myWord       = isFemale ? '私'   : '俺';
      return text
        .replace(/\{主人公名\}/g, name)
        .replace(/\{相手\}/g, '相手')
        .replace(/\{彼\}/g, otherPronoun)
        .replace(/\{彼女\}/g, selfPronoun)
        .replace(/\{私\}/g, myWord);
    }
    NS.applyPronouns = applyPronouns;

    /* ===============================================================
     * UI（Phase 2: チャットUI / AUTO / SKIP / LOG / MENU 実装）
     * ---------------------------------------------------------------
     * 設計方針:
     *   - SceneEngine と GameState の API には触らない（イベント購読のみ）。
     *   - チャットメッセージは「タイピング演出」で1文字ずつ表示。
     *   - 表示完了後はタップ or AUTO で次へ進行。
     *   - 選択肢は SceneEngine が 'choices' を発火したら表示。
     *   - AUTO は 'message' で表示完了後にタイマーで advance() を呼ぶ。
     *   - 感情(effect: 1/2/3)で AUTO の間隔を変調する。
     *
     * イベントとUI状態の対応:
     *   message  → タイピング表示（完了後、AUTO ならタイマー、手動なら待機）
     *   choices  → AUTO を一時停止（強制停止）して選択肢ボタン表示
     *   forced   → 「進む」ボタン or AUTO で自動進行
     *   sceneChange → ヘッダー進行表示更新
     *   end      → 終了演出 + MENU を促す
     * =============================================================== */
    const UI = (function () {
      // ----- DOM 取得 -----
      const $chat        = document.getElementById('chat-area');
      const $choices     = document.getElementById('choices');
      const $progress    = document.getElementById('header-progress');
      const $autoToggle  = document.getElementById('auto-toggle');
      const $autoState   = document.getElementById('auto-toggle-state');
      const $ctrlAuto    = document.getElementById('ctrl-auto');
      const $ctrlSkip    = document.getElementById('ctrl-skip');
      const $ctrlLog     = document.getElementById('ctrl-log');
      const $ctrlMenu    = document.getElementById('ctrl-menu');
      const $modalLog    = document.getElementById('modal-log');
      const $modalLogBody= document.getElementById('modal-log-body');
      const $modalMenu   = document.getElementById('modal-menu');
      const $menuSpeed   = document.getElementById('menu-speed');

      /* ---------------------------------------------------------------
       * 設定（UI ローカル）
       *
       * AUTO 速度は GameState とは独立した LocalStorage キーで保持する。
       * 理由: ゲーム進行のセーブ（reset で消える）と分離し、
       *       「最初から」を選んでも UI 設定は維持するため。
       * --------------------------------------------------------------- */
      const STORAGE_KEY_PREFS = 'whos-matching/ui-prefs-v1';

      // 1メッセージあたりの目安時間（ms）。仕様書の値に準拠。
      const AUTO_INTERVALS = Object.freeze({
        slow:   4000,
        normal: 2500,
        fast:   1500,
      });
      // タイピング速度（ms/文字）。effect レベルでも変化させる。
      const TYPING_SPEED_DEFAULT = 40;
      // タイピング後にメッセージを「読んでもらう」ための最小残時間（ms）。
      // タイピング所要時間が AUTO_INTERVAL を上回るときの保険。
      const POST_TYPING_MIN_HOLD = 500;

      const prefs = (function loadPrefs() {
        // 失敗してもデフォルトで起動できるように try/catch
        try {
          const raw = localStorage.getItem(STORAGE_KEY_PREFS);
          if (raw) {
            const obj = JSON.parse(raw);
            return {
              autoSpeed: AUTO_INTERVALS[obj.autoSpeed] ? obj.autoSpeed : 'normal',
            };
          }
        } catch (e) { /* noop */ }
        return { autoSpeed: 'normal' };
      })();

      function savePrefs() {
        try {
          localStorage.setItem(STORAGE_KEY_PREFS, JSON.stringify(prefs));
        } catch (_) { /* noop */ }
      }

      /* ---------------------------------------------------------------
       * 内部状態
       *
       * autoMode  : AUTO ON/OFF
       * typing    : 現在タイピング中か（true ならタップで即時完了）
       * waiting   : タイピング完了後、次の advance() を待っている状態
       * pendingChoices: 'choices' 受信後、選択待ちか（AUTO は停止）
       * pendingForced : 'forced' 受信後、進行待ちか
       * lastEffect: 直近メッセージの effect レベル（1..3）。AUTO 間隔の変調に使う。
       * --------------------------------------------------------------- */
      const ui = {
        autoMode: false,
        typing: false,
        waiting: false,
        pendingChoices: false,
        pendingForced: false,
        lastEffect: 1,
        // タイピング中の制御用
        typingTimer: null,
        typingFinish: null, // 即時完了用 callback
        // AUTO 用タイマー
        autoTimer: null,
      };

      /* ---------------------------------------------------------------
       * ユーティリティ
       * --------------------------------------------------------------- */
      function clearChoices() {
        $choices.innerHTML = '';
      }

      function clearAutoTimer() {
        if (ui.autoTimer) {
          clearTimeout(ui.autoTimer);
          ui.autoTimer = null;
        }
      }

      function scrollChatToBottom() {
        // 自動スクロール: 新メッセージは最下部へ。タイピング途中の追従にも使う。
        $chat.scrollTop = $chat.scrollHeight;
      }

      // chapter / scene 番号をシーンIDから推定して表示する。
      // - 'ch1-sceneN' / 'ch2-sceneN' / 'ending-xxx' / 'demo-N' を判別。
      function updateProgress(sceneId) {
        if (!sceneId) {
          $progress.textContent = 'Ch.- / Scene -';
          return;
        }
        const id = String(sceneId);

        // エンディング画面: Ending: GOOD など
        if (id.indexOf('ending-') === 0) {
          const tag = id.slice('ending-'.length).toUpperCase();
          $progress.textContent = 'Ending : ' + tag;
          return;
        }

        // 'ch1-sceneN' 形式（最優先）: chapter は ID の "ch1"/"ch2" から決定
        const chMatch = id.match(/^ch(\d)-scene(\d+)/);
        if (chMatch) {
          $progress.textContent = 'Ch.' + chMatch[1] + ' / Scene ' + chMatch[2];
          return;
        }

        // ハブシーン（ch2-transition 等）も Ch2 として扱う
        const chHub = id.match(/^ch(\d)-/);
        if (chHub) {
          $progress.textContent = 'Ch.' + chHub[1] + ' / —';
          return;
        }

        // フォールバック: 数値抽出
        const m = id.match(/(\d+)/);
        const n = m ? parseInt(m[1], 10) : null;
        let chapter = '-';
        let scene = n != null ? n : '-';
        if (n != null) {
          chapter = n <= 10 ? 1 : 2;
        }
        $progress.textContent = 'Ch.' + chapter + ' / Scene ' + scene;
      }

      /* ---------------------------------------------------------------
       * AUTO トグル / 速度
       * --------------------------------------------------------------- */
      function setAutoMode(on) {
        ui.autoMode = !!on;
        $autoToggle.classList.toggle('is-on', ui.autoMode);
        $autoToggle.setAttribute('aria-pressed', ui.autoMode ? 'true' : 'false');
        $autoState.textContent = ui.autoMode ? 'ON' : 'OFF';
        $ctrlAuto.classList.toggle('is-active', ui.autoMode);
        if (!ui.autoMode) {
          // OFF にしたら予約済み AUTO は破棄
          clearAutoTimer();
        } else {
          // ON にした瞬間、待機中なら自動で次へ進める
          maybeScheduleAuto();
        }
      }

      function setAutoSpeed(speed) {
        if (!AUTO_INTERVALS[speed]) return;
        prefs.autoSpeed = speed;
        savePrefs();
        renderSpeedSeg();
      }

      function renderSpeedSeg() {
        $menuSpeed.querySelectorAll('.speed-seg__btn').forEach((b) => {
          b.classList.toggle('is-active', b.dataset.speed === prefs.autoSpeed);
        });
      }

      /* ---------------------------------------------------------------
       * AUTO 間隔の計算（感情連動制御）
       *
       * effect レベルに応じて AUTO の進行間隔を変調する:
       *   1: 基本速度（前半・恋愛）
       *   2: ランダムに +200..500ms 追加（中盤・違和感）
       *   3: ランダムに +1000ms or 2倍速（後半・恐怖）
       * --------------------------------------------------------------- */
      function computeAutoDelay(effect) {
        const base = AUTO_INTERVALS[prefs.autoSpeed] || AUTO_INTERVALS.normal;
        if (effect === 2) {
          // 不規則化: +200..500ms
          return base + Math.floor(200 + Math.random() * 300);
        }
        if (effect === 3) {
          // 予測不能: 70% で +1000..2500ms 追加、30% で 半分（2倍速）
          if (Math.random() < 0.7) {
            return base + Math.floor(1000 + Math.random() * 1500);
          }
          return Math.max(400, Math.floor(base * 0.5));
        }
        return base;
      }

      // タイピング速度も effect で変える（後半ほど不安定）。
      function computeTypingSpeed(message) {
        if (typeof message.speed === 'number') return message.speed;
        const eff = message.effect || 1;
        if (eff === 3) return TYPING_SPEED_DEFAULT + 20; // 重め
        if (eff === 2) return TYPING_SPEED_DEFAULT + 10;
        return TYPING_SPEED_DEFAULT;
      }

      /* ---------------------------------------------------------------
       * Phase 4: 演出クラスの切替・フラッシュ・画像差し込み
       *
       * applyEffectClass(level):
       *   <body> に .effect-lv-1 / -2 / -3 を排他で付ける。
       *   .effect-entrance は entrance:true メッセージ間だけ追加され、
       *   次の effect 切替時に自動で外される。
       *
       * triggerFlash():
       *   スタンガンや暴れ時の白フラッシュ。CSS animation で 900ms。
       *
       * renderSceneImage(imageKey):
       *   チャットエリアに <object data=...svg> を差し込む。
       *   フェード演出を伴う。失敗時は何も出さない（壊さない）。
       * --------------------------------------------------------------- */
      function applyEffectClass(level) {
        const body = document.body;
        // 既存の effect-lv-* と effect-entrance を一旦掃除。
        // entrance は同じ effect レベルでも持続させたい場合があるが、
        // 仕様上 Scene10 の messages 内で完結するので毎メッセージ再評価でよい。
        body.classList.remove('effect-lv-1', 'effect-lv-2', 'effect-lv-3', 'effect-entrance');
        const lv = (level === 2 || level === 3) ? level : 1;
        body.classList.add('effect-lv-' + lv);
      }

      function triggerFlash() {
        // 既存のフラッシュ要素が残っていれば削除してから差し直す。
        const old = document.querySelector('.effect-flash');
        if (old && old.parentNode) old.parentNode.removeChild(old);
        const el = document.createElement('div');
        el.className = 'effect-flash';
        document.body.appendChild(el);
        // animation-fill-mode:forwards で見た目は残るが、DOMは1秒後に掃除。
        setTimeout(() => {
          if (el.parentNode) el.parentNode.removeChild(el);
        }, 1000);
      }

      function renderSceneImage(imageKey) {
        const path = resolveImagePath(imageKey, GameState);
        if (!path) return;
        const wrap = document.createElement('div');
        wrap.className = 'scene-image';
        // <object> を使うと SVG が DOM として評価され、フィルタや
        // CSS の影響を受けやすい。<img> でも可だが <object> を選択。
        const obj = document.createElement('object');
        obj.setAttribute('type', 'image/svg+xml');
        obj.setAttribute('data', path);
        obj.setAttribute('aria-label', imageKey);
        // 失敗時は wrap を消す（壊れた枠を残さない）
        obj.addEventListener('error', () => {
          if (wrap.parentNode) wrap.parentNode.removeChild(wrap);
        });
        wrap.appendChild(obj);
        $chat.appendChild(wrap);
        scrollChatToBottom();
      }

      /* ---------------------------------------------------------------
       * メッセージ描画（タイピング演出）
       *
       * Phase 4 追加:
       *  - message.image があれば吹き出しの直前に画像エリアを差し込む
       *    （SVG ファイルを <object> で読み込み、見つからなければ非表示）
       *  - message.entrance / message.flash / message.effect で演出を切替
       *  - text 中の {彼}{彼女}{相手}{私}{主人公名} を主人公性別に応じて置換
       * --------------------------------------------------------------- */
      function renderMessage(message, onDone) {
        // ---- 演出制御 -------------------------------------------------
        // effect レベルを <body> クラスに反映（Lv1〜3）。
        // 既存クラスを掃除してから新しい1つだけ付与する。
        applyEffectClass(message.effect || 1);
        // 玄関演出（Scene10）は entrance: true で発動。effect クラスに上乗せ。
        if (message.entrance) {
          document.body.classList.add('effect-entrance');
        }
        // フラッシュ演出（スタンガン等）は一時的なオーバーレイ。
        if (message.flash) {
          triggerFlash();
        }

        // ---- 画像差し込み ---------------------------------------------
        if (message.image) {
          renderSceneImage(message.image);
        }

        // ---- 行コンテナ + バブル生成 ----------------------------------
        const row = document.createElement('div');
        row.className = 'msg msg--' + message.speaker;
        const bubble = document.createElement('div');
        bubble.className = 'msg__bubble is-typing';
        row.appendChild(bubble);
        $chat.appendChild(row);
        scrollChatToBottom();

        // ---- テキスト確定（プレースホルダ置換） -----------------------
        // 表示前に { 彼 } などを置換しておく（タイピング途中の置換は不安定なため）。
        const rawText = String(message.text || '');
        const text = applyPronouns(rawText, GameState);
        const speed = computeTypingSpeed(message);

        let i = 0;
        ui.typing = true;

        function step() {
          if (!ui.typing) return; // 即時完了などで中断された
          if (i >= text.length) {
            finish();
            return;
          }
          // 1文字追加。textContent を都度書き換える方が DOM ノイズが少ない。
          i += 1;
          bubble.textContent = text.slice(0, i);
          scrollChatToBottom();
          ui.typingTimer = setTimeout(step, speed);
        }

        function finish() {
          // タイピング即時完了: 残り全文を一気に表示してキャレットを消す
          if (ui.typingTimer) { clearTimeout(ui.typingTimer); ui.typingTimer = null; }
          bubble.textContent = text;
          bubble.classList.remove('is-typing');
          ui.typing = false;
          ui.typingFinish = null;
          scrollChatToBottom();
          if (typeof onDone === 'function') onDone();
        }

        // 外部からタイピングを即時完了させるためのハンドル
        ui.typingFinish = finish;

        // 空文字メッセージは即終了
        if (text.length === 0) {
          finish();
        } else {
          ui.typingTimer = setTimeout(step, speed);
        }
      }

      /* ---------------------------------------------------------------
       * 選択肢描画
       *
       * 4択でも縦画面で読みやすいようボタンは縦並び（CSSで定義済み）。
       * AUTO モード時もここで自動的に停止する（ボタン表示=待機状態）。
       * --------------------------------------------------------------- */
      function renderChoices(choices) {
        clearChoices();
        ui.pendingChoices = true;
        ui.pendingForced = false;
        // AUTO 進行を強制停止
        clearAutoTimer();

        const buttons = [];
        choices.forEach((choice, idx) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'choice-btn';
          btn.textContent = choice.label;
          btn.addEventListener('click', (ev) => {
            ev.stopPropagation(); // チャットエリアの「タップで進行」と競合しないように
            handleChoiceTap(idx, btn, buttons, choice);
          });
          $choices.appendChild(btn);
          buttons.push(btn);
        });
      }

      function handleChoiceTap(idx, selectedBtn, allButtons, choice) {
        if (!ui.pendingChoices) return;
        ui.pendingChoices = false;

        // 選択直後にボタン群を非操作化 + フェードアウト
        // （選んだ感は短く残しつつ、すぐに DOM から消して画面を整理する）
        allButtons.forEach((b) => { b.disabled = true; });
        $choices.classList.add('is-fading');

        // チャットに表示する自然な台詞: choice.say があればそれ、無ければ label にフォールバック
        const sayText = (choice && choice.say) ? choice.say : choice.label;

        // エンディング画面の特殊サニチネル: __restart__ / __title__
        // 通常シーンと同じ choice UI で扱うため、ここで横取りする。
        if (choice && (choice.next === '__restart__' || choice.next === '__title__')) {
          appendChoiceEcho(sayText);
          setTimeout(() => {
            clearChoices();
            $choices.classList.remove('is-fading');
            if (choice.next === '__restart__') {
              // セーブを破棄して最初から
              GameState.reset();
              $chat.innerHTML = '';
              ui.waiting = false;
              ui.pendingChoices = false;
              ui.pendingForced = false;
              ui.typing = false;
              if (ui.typingTimer) { clearTimeout(ui.typingTimer); ui.typingTimer = null; }
              clearAutoTimer();
              SceneEngine.start('ch1-scene1');
            } else {
              // タイトルへ戻る = ページリロード
              location.reload();
            }
          }, 350);
          return;
        }

        // 主人公の発話としてチャットに追加（自然な say テキスト）してから進行
        // → SceneEngine.choose() 内で GameState.appendLog も走るので、
        //   ここでは「画面表示だけ」を担当する。choose() に sayText を渡して
        //   ログにも自然な会話文を残す。
        appendChoiceEcho(sayText);
        // 少し余韻を残してから choose（演出として 350ms ほど）。
        // この間に選択肢エリアは fade-out → クリアされる。
        setTimeout(() => {
          clearChoices();
          $choices.classList.remove('is-fading');
          SceneEngine.choose(idx, sayText);
        }, 350);
      }

      function appendChoiceEcho(text) {
        // 選んだ選択肢を主人公の吹き出しとして即時表示（タイピングなし）。
        // 次シーンが始まる前にプレイヤーに「自分の発言」として実感させるため。
        const row = document.createElement('div');
        row.className = 'msg msg--protagonist';
        const bubble = document.createElement('div');
        bubble.className = 'msg__bubble';
        bubble.textContent = text;
        row.appendChild(bubble);
        $chat.appendChild(row);
        scrollChatToBottom();
      }

      /* ---------------------------------------------------------------
       * forced（選択肢なしで進行）
       *
       * 表示UIとしては「▶ 次へ」ボタンを選択肢エリアに出す。
       * AUTO ON ならボタンを出しつつ、自動でタイマーで進行させる。
       * --------------------------------------------------------------- */
      function renderForced(next) {
        clearChoices();
        ui.pendingChoices = false;
        ui.pendingForced = true;

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'choice-btn choice-btn--accent';
        btn.textContent = next ? '▶ 次へ' : '— 終わり —';
        btn.disabled = !next;
        btn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          if (!ui.pendingForced) return;
          ui.pendingForced = false;
          SceneEngine.proceedForced();
        });
        $choices.appendChild(btn);

        // forced も AUTO の対象（読了後に自動で次シーンへ）
        maybeScheduleAuto();
      }

      /* ---------------------------------------------------------------
       * AUTO スケジューリング
       *
       * waiting / pendingForced のときだけタイマーをセットする。
       * メッセージ表示の effect を反映した間隔で advance を呼ぶ。
       * --------------------------------------------------------------- */
      function maybeScheduleAuto() {
        clearAutoTimer();
        if (!ui.autoMode) return;
        if (ui.pendingChoices) return; // 選択肢では強制停止
        if (ui.typing) return;

        const delay = computeAutoDelay(ui.lastEffect);
        // メッセージ読了の保険として最小ホールドを担保
        const wait = Math.max(POST_TYPING_MIN_HOLD, delay);

        ui.autoTimer = setTimeout(() => {
          ui.autoTimer = null;
          if (!ui.autoMode) return;
          if (ui.pendingChoices) return;
          if (ui.pendingForced) {
            ui.pendingForced = false;
            SceneEngine.proceedForced();
          } else if (ui.waiting) {
            ui.waiting = false;
            SceneEngine.advance();
          }
        }, wait);
      }

      /* ---------------------------------------------------------------
       * チャットエリアのタップ進行
       *
       * 仕様: 「タップで次へ進める」「タップで AUTO 即停止」。
       * - タイピング中  → タイピング即完了
       * - 待機中(waiting) → advance()
       * - forced 待ち → proceedForced()
       * - 選択肢中    → 何もしない（選択肢ボタンが優先）
       * --------------------------------------------------------------- */
      function handleChatTap() {
        // タップは AUTO を即停止する（仕様）
        if (ui.autoMode) {
          setAutoMode(false);
        }
        if (ui.pendingChoices) return;

        if (ui.typing) {
          // タイピング途中なら即時完了
          if (typeof ui.typingFinish === 'function') ui.typingFinish();
          return;
        }
        if (ui.pendingForced) {
          ui.pendingForced = false;
          SceneEngine.proceedForced();
          return;
        }
        if (ui.waiting) {
          ui.waiting = false;
          SceneEngine.advance();
        }
      }

      /* ---------------------------------------------------------------
       * SKIP: 次の入力ポイントへ即座に進む
       *
       * - タイピング中 → 即完了して advance() まで（forced/choice 直前まで）
       * - 待機中 → そのまま advance()
       * - forced → proceedForced()
       * 選択肢では SKIP は無効（プレイヤーの判断が必要）。
       * --------------------------------------------------------------- */
      function handleSkip() {
        if (ui.pendingChoices) return;
        if (ui.typing && typeof ui.typingFinish === 'function') {
          ui.typingFinish();
          // タイピング完了直後に AUTO や手動と同様の待機状態にする。
          // SKIP の意味は「次のメッセージへ即進む」なので、即 advance を呼ぶ。
          ui.waiting = false;
          // AUTO タイマーが動いていたら止めて、即進行
          clearAutoTimer();
          SceneEngine.advance();
          return;
        }
        if (ui.pendingForced) {
          ui.pendingForced = false;
          clearAutoTimer();
          SceneEngine.proceedForced();
          return;
        }
        if (ui.waiting) {
          ui.waiting = false;
          clearAutoTimer();
          SceneEngine.advance();
        }
      }

      /* ---------------------------------------------------------------
       * モーダル開閉
       * --------------------------------------------------------------- */
      function openModal($modal) {
        $modal.classList.add('is-open');
        $modal.setAttribute('aria-hidden', 'false');
      }
      function closeModal($modal) {
        $modal.classList.remove('is-open');
        $modal.setAttribute('aria-hidden', 'true');
      }

      /* ---------------------------------------------------------------
       * LOG モーダル: GameState.log を時系列で表示
       * --------------------------------------------------------------- */
      function renderLogModal() {
        const log = GameState.get('log') || [];
        $modalLogBody.innerHTML = '';
        if (log.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'log-empty';
          empty.textContent = '（まだ会話はありません）';
          $modalLogBody.appendChild(empty);
          return;
        }
        const speakerLabel = {
          partner:     'AKARI', // Phase 3 で character-spec の名前に置き換え可
          protagonist: 'YOU',
          narration:   '...',
        };
        log.forEach((entry) => {
          const div = document.createElement('div');
          div.className = 'log-entry log-entry--' + entry.speaker +
            (entry.choice ? ' log-entry--choice' : '');
          const meta = document.createElement('span');
          meta.className = 'log-entry__meta';
          meta.textContent = speakerLabel[entry.speaker] || entry.speaker;
          const text = document.createElement('span');
          text.className = 'log-entry__text';
          text.textContent = entry.text;
          div.appendChild(meta);
          div.appendChild(text);
          $modalLogBody.appendChild(div);
        });
        // 末尾までスクロール（最新が見える状態で開く）
        $modalLogBody.scrollTop = $modalLogBody.scrollHeight;
      }

      /* ---------------------------------------------------------------
       * MENU モーダル
       *   - AUTO 速度切替
       *   - 最初から（セーブ削除 + 再開）
       *   - タイトルへ戻る（リロード）
       * --------------------------------------------------------------- */
      function bindMenu() {
        // 速度セグメント
        $menuSpeed.querySelectorAll('.speed-seg__btn').forEach((b) => {
          b.addEventListener('click', () => setAutoSpeed(b.dataset.speed));
        });
        renderSpeedSeg();

        // 「最初から」: GameState.reset() してデモシーン再起動
        $modalMenu.querySelector('[data-menu="restart"]').addEventListener('click', () => {
          if (!confirm('セーブを破棄して最初からやり直しますか？')) return;
          GameState.reset();
          // チャット領域・選択肢を初期化
          $chat.innerHTML = '';
          clearChoices();
          ui.waiting = false;
          ui.pendingChoices = false;
          ui.pendingForced = false;
          ui.typing = false;
          if (ui.typingTimer) { clearTimeout(ui.typingTimer); ui.typingTimer = null; }
          clearAutoTimer();
          closeModal($modalMenu);
          // 本番シナリオの最初のシーンから再開
          SceneEngine.start('ch1-scene1');
        });

        // 「タイトルへ戻る」: ページリロード（簡素なタイトル復帰相当）
        $modalMenu.querySelector('[data-menu="title"]').addEventListener('click', () => {
          location.reload();
        });
      }

      /* ---------------------------------------------------------------
       * イベントバインド
       * --------------------------------------------------------------- */
      function bindGlobal() {
        // ヘッダー AUTO トグル
        $autoToggle.addEventListener('click', () => setAutoMode(!ui.autoMode));

        // フッター: AUTO / SKIP / LOG / MENU
        $ctrlAuto.addEventListener('click', () => setAutoMode(!ui.autoMode));
        $ctrlSkip.addEventListener('click', handleSkip);
        $ctrlLog.addEventListener('click', () => {
          renderLogModal();
          openModal($modalLog);
        });
        $ctrlMenu.addEventListener('click', () => openModal($modalMenu));

        // モーダルの閉じるボタン
        document.querySelectorAll('[data-modal-close]').forEach((b) => {
          b.addEventListener('click', () => {
            const id = b.getAttribute('data-modal-close');
            const $m = document.getElementById(id);
            if ($m) closeModal($m);
          });
        });
        // モーダル背景タップで閉じる（パネル内タップは伝搬しない）
        [$modalLog, $modalMenu].forEach(($m) => {
          $m.addEventListener('click', (ev) => {
            if (ev.target === $m) closeModal($m);
          });
          $m.querySelector('.modal__panel').addEventListener('click', (ev) => {
            ev.stopPropagation();
          });
        });

        // チャットエリアのタップで進行 / AUTO 停止
        $chat.addEventListener('click', handleChatTap);
      }

      function bindEngine() {
        SceneEngine.on('message', (e) => {
          // 直近 effect を更新（AUTO 間隔の変調に使う）
          ui.lastEffect = e.message.effect || 1;
          ui.waiting = false;
          ui.pendingForced = false;
          ui.pendingChoices = false;
          // タイピング中の途中で次が来た場合は前のを完了させてから進める
          if (ui.typing && typeof ui.typingFinish === 'function') {
            ui.typingFinish();
          }
          renderMessage(e.message, () => {
            // タイピング完了後は「次のタップ待ち」状態に入る
            ui.waiting = true;
            // AUTO ON ならタイマーで自動進行
            maybeScheduleAuto();
          });
        });

        SceneEngine.on('choices', (e) => {
          renderChoices(e.choices);
        });

        SceneEngine.on('forced', (e) => {
          renderForced(e.next);
        });

        SceneEngine.on('sceneChange', (e) => {
          updateProgress(e.sceneId);
        });

        SceneEngine.on('end', (e) => {
          // 終了演出: ナレーションで終了表示し、選択肢領域はクリア。
          // MENU から「最初から」できることをプレイヤーに気付かせる。
          clearChoices();
          ui.waiting = false;
          ui.pendingChoices = false;
          ui.pendingForced = false;
          clearAutoTimer();
          const note = document.createElement('div');
          note.className = 'msg msg--narration';
          const bubble = document.createElement('div');
          bubble.className = 'msg__bubble';
          bubble.textContent = '——終了。MENU から「最初から」を選べます。';
          note.appendChild(bubble);
          $chat.appendChild(note);
          scrollChatToBottom();
          console.log('[SceneEngine] end:', e);
        });
      }

      /* ---------------------------------------------------------------
       * 外部から状態を初期化する API（タイトル「最初から」用）
       * UI 内部の cursor/timer をクリアした上で SceneEngine.start を呼ぶ。
       * --------------------------------------------------------------- */
      function resetUIState() {
        $chat.innerHTML = '';
        clearChoices();
        ui.waiting = false;
        ui.pendingChoices = false;
        ui.pendingForced = false;
        ui.typing = false;
        if (ui.typingTimer) { clearTimeout(ui.typingTimer); ui.typingTimer = null; }
        clearAutoTimer();
        // 演出クラスもクリア
        document.body.classList.remove('effect-lv-1', 'effect-lv-2', 'effect-lv-3', 'effect-entrance');
      }

      function boot() {
        bindGlobal();
        bindMenu();
        bindEngine();
        // 初期 AUTO 状態を反映（OFF）
        setAutoMode(false);
        // 本番シナリオをロードしておく（タイトル画面から起動される）
        SceneEngine.loadScenes(ALL_SCENES);
      }

      return {
        boot,
        resetUIState,
        // タイトル画面から呼ばれる「ゲーム開始」エントリ
        startScene: (sceneId) => SceneEngine.start(sceneId),
      };
    })();

    NS.UI = UI;

    /* ===============================================================
     * TitleScreen（Phase 4 / #29）
     * ---------------------------------------------------------------
     * 仕様: docs/character-spec.md「主人公性別オプション」
     *
     * - 起動時に表示。性別選択 + 名前入力 + はじめる/続きから。
     * - 「はじめる」: GameState.reset() → protagonist 設定 → ch1-scene1
     * - 「続きから」: GameState.load() に成功 → 保存済み sceneId から再開
     * - タイトル画面はゲーム本体（.app）と排他で表示（display: none/flex）。
     * =============================================================== */
    const TitleScreen = (function () {
      // DOM への参照は bind() で遅延取得する（DOMContentLoaded 後の起動を保証）。
      let $title, $app, $name, $hint, $start, $cont, $genderBtns;

      // 選択中の性別を保持（初期値: female）
      let selectedGender = 'female';

      function defaultName() {
        return selectedGender === 'male' ? '拓海' : '美咲';
      }

      function updateNameUi() {
        // 名前入力のプレースホルダとヒントをデフォルト名に追従させる
        $name.placeholder = defaultName();
        $hint.textContent = '未入力ならデフォルト名「' + defaultName() + '」が使われます。';
      }

      function setGender(g) {
        if (g !== 'male' && g !== 'female') return;
        selectedGender = g;
        $genderBtns.forEach((b) => {
          const on = b.dataset.gender === g;
          b.classList.toggle('is-active', on);
          b.setAttribute('aria-checked', on ? 'true' : 'false');
        });
        updateNameUi();
      }

      function show() {
        $title.classList.add('is-open');
        $title.setAttribute('aria-hidden', 'false');
        $app.classList.add('is-hidden');
        // 「続きから」は LocalStorage に sceneId が保存されている場合のみ有効
        const hasSave = checkSavedScene();
        $cont.disabled = !hasSave;
      }

      function hide() {
        $title.classList.remove('is-open');
        $title.setAttribute('aria-hidden', 'true');
        $app.classList.remove('is-hidden');
      }

      function checkSavedScene() {
        // GameState.load() を試して、有効なシーンIDがあれば true。
        // 副作用として state にロードされる（はじめる側で reset するので問題なし）。
        try {
          const raw = localStorage.getItem(GameState.STORAGE_KEY);
          if (!raw) return false;
          const parsed = JSON.parse(raw);
          return !!(parsed && typeof parsed.sceneId === 'string' && parsed.sceneId);
        } catch (_) {
          return false;
        }
      }

      function applyProtagonistFromInput() {
        const name = ($name.value || '').trim() || defaultName();
        // GameState.set('protagonist', ...) で protagonist 全体を差し替え
        GameState.set('protagonist', { gender: selectedGender, name: name });
      }

      function startNewGame() {
        // 既存セーブを破棄して、選択した性別・名前で開始
        GameState.reset();
        applyProtagonistFromInput();
        // UI内部状態もクリア
        UI.resetUIState();
        hide();
        UI.startScene('ch1-scene1');
      }

      function continueGame() {
        const ok = GameState.load();
        if (!ok) {
          // 念のためフォールバック: 続きが無ければ新規扱い
          startNewGame();
          return;
        }
        // 保存された性別を選択UIにも反映（次回タイトル表示時の見た目整合）
        const p = GameState.get('protagonist') || {};
        if (p.gender) setGender(p.gender);
        UI.resetUIState();
        hide();
        const sceneId = GameState.get('sceneId') || 'ch1-scene1';
        UI.startScene(sceneId);
      }

      function bind() {
        // DOMContentLoaded 後に呼ばれる前提でここで DOM を取得
        $title = document.getElementById('title-screen');
        $app   = document.getElementById('app');
        $name  = document.getElementById('title-name-input');
        $hint  = document.getElementById('title-name-hint');
        $start = document.getElementById('title-start');
        $cont  = document.getElementById('title-continue');
        $genderBtns = $title.querySelectorAll('.title-gender__btn');

        $genderBtns.forEach((b) => {
          b.addEventListener('click', () => setGender(b.dataset.gender));
        });
        $start.addEventListener('click', startNewGame);
        $cont.addEventListener('click', () => {
          if ($cont.disabled) return;
          continueGame();
        });
        // Enter キーで「はじめる」を発火（PCでも遊びやすく）
        $name.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter') {
            ev.preventDefault();
            startNewGame();
          }
        });
        updateNameUi();
      }

      return { bind, show, hide };
    })();

    NS.TitleScreen = TitleScreen;

    // DOM 構築後に起動
    document.addEventListener('DOMContentLoaded', () => {
      UI.boot();
      TitleScreen.bind();
      TitleScreen.show();
    });

  })(window);
  </script>
</body>
</html>
